<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>高级质感封面模板</title>
    <!-- 使用本地安装的 Noto Serif CJK 字体，避免网络字体加载问题 -->
    <style>
      :root {
        --bg-base: #f9f8f4;
        --bg-gradient: radial-gradient(
          circle at 70% 30%,
          #ffffff 0%,
          #f4f2ea 100%
        );
        --text: #1a1a1a;
        --title-color: #111111;
        --highlight: rgba(212, 175, 55, 0.4);
        --accent: #b08d57;
        --muted: #666666;
        --border-color: rgba(0, 0, 0, 0.08);
        --glass-bg: rgba(255, 255, 255, 0.6);
        --shadow-color: rgba(0, 0, 0, 0.05);
      }

      [data-theme="dark"] {
        --bg-base: #070605;
        --bg-gradient: radial-gradient(
          circle at 50% 50%,
          #1c1811 0%,
          #050403 100%
        );
        --text: #d4cfc9;
        --title-color: #ebd299;
        --highlight: rgba(235, 210, 153, 0.35);
        --accent: #c9a054;
        --muted: #8a8275;
        --border-color: rgba(201, 160, 84, 0.15);
        --glass-bg: rgba(20, 17, 12, 0.6);
        --shadow-color: rgba(
          0,
          0,
          0,
          0.8
        ); /* 阴影加深，让金色文字更有悬浮立体感 */
      }

      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: "Noto Serif CJK SC", "Source Han Serif SC", "Source Han Serif CN", serif;
        background-color: var(--bg-base);
        background-image: var(--bg-gradient);
        width: 675px;
        height: 1200px;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        position: relative;
        overflow: hidden;
      }

      .noise-overlay {
        position: absolute;
        inset: 0;
        z-index: 0;
        pointer-events: none;
        opacity: 0.3;
        background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.8' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)' opacity='0.1'/%3E%3C/svg%3E");
      }

      .page-frame {
        position: absolute;
        top: 24px;
        bottom: 24px;
        left: 24px;
        right: 24px;
        border: 1px solid var(--border-color);
        z-index: 10;
        pointer-events: none;
      }

      .bg-decoration {
        position: absolute;
        inset: 0;
        pointer-events: none;
        z-index: 0;
      }
      .ambient-orb {
        position: absolute;
        border-radius: 50%;
        background: var(--accent);
        filter: blur(120px);
        opacity: 0.12;
      }
      .orb-1 {
        width: 500px;
        height: 500px;
        top: -100px;
        right: -150px;
      }
      .orb-2 {
        width: 600px;
        height: 600px;
        bottom: -200px;
        left: -200px;
      }

      /* 核心内容区排版调整 */
      .core-content {
        position: absolute;
        top: 20%; /* 稍微下移，避开顶部的太空感 */
        width: 100%;
        padding: 0 80px 0 90px; /* 增加左侧内边距给装饰线留位置 */
        z-index: 5;
        display: flex;
        flex-direction: column;
        align-items: flex-start;
      }

      /* 装饰线：相对于标题对齐 */
      .title-container {
        position: relative;
        width: 100%;
        text-align: left;
      }

      /* 精准对齐的左侧垂直线 */
      .title-container::before {
        content: "";
        position: absolute;
        left: -35px;
        top: 20px;
        bottom: 10px;
        width: 4px;
        background: var(--accent);
        border-radius: 4px;
        opacity: 0.8;
      }

      .title {
        font-size: 90px !important;
        font-weight: 700;
        color: var(--title-color);
        line-height: 1.35 !important;
        letter-spacing: 0.02em;
        word-break: break-word;
        text-shadow: 0 10px 30px var(--shadow-color);
      }

      .swipe-hint {
        margin-top: 40px;
        display: none;
        align-items: center;
        gap: 12px;
        background: var(--glass-bg);
        border: 1px solid var(--border-color);
        padding: 10px 24px;
        border-radius: 40px;
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
        box-shadow: 0 8px 20px var(--shadow-color);
      }

      .swipe-hint.visible {
        display: flex;
      }

      .swipe-hint span {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        color: var(--text);
        font-size: 14px;
        font-weight: 700;
        letter-spacing: 2px;
        text-transform: uppercase;
      }

      .swipe-hint svg {
        width: 20px;
        height: 20px;
        color: var(--accent);
        animation: arrow-move 1.5s cubic-bezier(0.25, 1, 0.5, 1) infinite;
      }

      @keyframes arrow-move {
        0%,
        100% {
          transform: translateX(0);
          opacity: 0.6;
        }
        50% {
          transform: translateX(6px);
          opacity: 1;
        }
      }

      .footer {
        position: absolute;
        bottom: 56px;
        left: 80px;
        right: 80px;
        display: flex;
        justify-content: space-between;
        align-items: flex-end;
        z-index: 20;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      .footer::before {
        content: "";
        position: absolute;
        top: -24px;
        left: 0;
        right: 0;
        height: 1px;
        background: var(--border-color);
      }

      .footer-left,
      .footer-right {
        color: var(--muted);
        font-size: 18px;
        letter-spacing: 0.1em;
        text-transform: uppercase;
        font-weight: 600;
      }
    </style>
  </head>
  <body>
    <div class="noise-overlay"></div>
    <div class="page-frame"></div>

    <div class="bg-decoration">
      <div class="ambient-orb orb-1"></div>
      <div class="ambient-orb orb-2"></div>
    </div>

    <div class="core-content">
      <div class="title-container">
        <h1 class="title">
          <span id="title">标题占位文字</span>
        </h1>
      </div>

      <div class="swipe-hint" id="swipeHint">
        <span>Slide to explore</span>
        <svg
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="3"
          stroke-linecap="round"
          stroke-linejoin="round"
        >
          <line x1="5" y1="12" x2="19" y2="12"></line>
          <polyline points="12 5 19 12 12 19"></polyline>
        </svg>
      </div>
    </div>

    <div class="footer">
      <span class="footer-left" id="customText">DESIGN BY CURIOUS</span>
      <span class="footer-right" id="dateText">2026.03.12</span>
    </div>

    <script>
      const titleEl = document.getElementById("title");
      const observer = new MutationObserver(() => {
        if (!titleEl.querySelector(".highlight-wrap") && titleEl.textContent) {
          const text = titleEl.textContent;
          titleEl.innerHTML = `<span class="highlight-wrap" style="
            background: linear-gradient(transparent 60%, var(--highlight) 40%);
            box-decoration-break: clone;
            -webkit-box-decoration-break: clone;
            padding: 0 4px;
            display: inline;
          ">${text}</span>`;
        }
      });
      observer.observe(titleEl, {
        childList: true,
        characterData: true,
        subtree: true,
      });
    </script>
  </body>
</html>
